volumes:
  pg_data:
  static:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend/
    image: alexanderprog05/taski_backend:latest   # или ваш образ
    env_file: .env
    volumes:
      - static:/backend_static
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "gunicorn --bind 0.0.0.0:8000 backend.wsgi"

  frontend:
    build: ./frontend/
    image: alexanderprog05/taski_frontend:latest
    env_file: .env
    volumes:
      - static:/frontend_static
    command: cp -r /app/build/. /frontend_static/

  gateway:
    build: ./gateway/
    ports:
      - "8000:80"
    volumes:
      - static:/staticfiles
    depends_on:
      - backend
      - frontend
